name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Biome check
        run: npx --yes @biomejs/biome@1.9.4 check .
