<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>YardPilot</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link rel="stylesheet" href="assets/style.css" />
        <link rel="icon" href="assets/favicon.png" />
    </head>
    <body>
        <div id="app">
            <nav id="sidebar">
                <div class="sidebar-header">
                    <img src="assets/logo.png" alt="YardPilot" class="logo" />
                </div>
                <div class="sidebar-body">
                    <section class="nav-section">
                        <h3 class="nav-section-title">Map Layers</h3>
                        <div class="nav-section-content">
                            <label class="toggle-row">
                                <span>Satellite imagery</span>
                                <input type="checkbox" checked />
                            </label>
                            <label class="toggle-row">
                                <span>Labels</span>
                                <input type="checkbox" />
                            </label>
                        </div>
                    </section>
                    <section class="nav-section">
                        <h3 class="nav-section-title">Zones</h3>
                        <div class="nav-section-content">
                            <div class="drop-zone" id="drop-perimeter">
                                <span class="drop-label">Perimeter</span>
                                <span class="drop-hint"
                                    >.poly or .waypoints</span
                                >
                            </div>
                            <div class="drop-zone" id="drop-exclusion">
                                <span class="drop-label">Exclusion Zone</span>
                                <span class="drop-hint">.waypoints</span>
                            </div>
                            <div id="zone-list"></div>
                        </div>
                    </section>
                    <section class="nav-section">
                        <h3 class="nav-section-title">Settings</h3>
                        <div class="nav-section-content">
                            <label class="input-row">
                                <span>Lane width (m)</span>
                                <input
                                    type="number"
                                    value="2"
                                    min="0.1"
                                    max="240"
                                    step="0.1"
                                />
                            </label>
                            <label class="input-row">
                                <span>Exclusion buffer (m)</span>
                                <input
                                    type="number"
                                    value="1"
                                    min="0.1"
                                    max="240"
                                    step="0.1"
                                />
                            </label>
                        </div>
                    </section>
                    <section class="nav-section">
                        <div class="nav-section-content">
                            <button class="btn" disabled>Generate Path</button>
                            <button class="btn" disabled>Export Waypoints</button>
                        </div>
                    </section>
                </div>
            </nav>
            <main id="map-container">
                <div id="map"></div>
            </main>
        </div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="assets/app.js"></script>
    </body>
</html>
